services:
  mongodb:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    healthcheck:
      test: |
        mongosh --username "$$MONGO_INITDB_ROOT_USERNAME" \
                --password "$$MONGO_INITDB_ROOT_PASSWORD" \
                --eval "db.adminCommand('ping')" \
                --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  backend:
    build: backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    # environment:
    #   - MONGO_URI=${MONGO_URI}
    #   - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build: frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:5000

  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:root@mongodb:27017/admin
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password#123
    depends_on:
      mongodb:
        condition: service_healthy   